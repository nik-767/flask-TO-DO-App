
{% extends "base.html" %}

{% block title %} My Tasks {% endblock %}

{% block content %}
<div class="tasks-container">
    <h2>My To-Do List</h2>
    
    <form method="POST" action="{{ url_for('tasks.add_tasks') }}" class="add-task-form">
        <input type="text" name="title" placeholder="Enter a new task..." required>
        <button type="submit" class="btn">Add Task</button>
    </form>

    <ul class="task-list">{% for task in tasks %}
            <li class="task-item {% if task.status == 'Done' %}completed{% endif %}">
                <span class="task-text">{{ task.title }}</span>
                <div class="task-actions">
                    <form method="POST" action="{{ url_for('tasks.toggle_status', task_id=task.id) }}" style="display:inline;">
                        <button type="submit" class="btn-small">
                            {% if task.status == 'Done' %} Undo {% else %} Done {% endif %}
                        </button>
                    </form>
                    <form method="POST" action="{{ url_for('tasks.delete_task', task_id=task.id) }}" style="display:inline;">
                        <button type="submit" class="btn-small btn-danger" onclick="return confirm('Are you sure?')">Delete</button>
                    </form>
                </div>
            </li>
        {% endfor %}</ul>
    {% if not tasks %}
        <p>No tasks found. Add one above!</p>
    {% endif %}
</div>
{% endblock %}
